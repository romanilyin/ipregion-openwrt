name: OpenWrt SDK Builds

on:
  workflow_dispatch:
  push:
    tags:
      - '20*.*.*-*'

jobs:
  sdk-build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: mediatek/filogic
            slug: mediatek-filogic
          - target: x86/64
            slug: x86-64
          - target: ramips/mt7621
            slug: ramips-mt7621
          - target: ath79/generic
            slug: ath79-generic
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SDK host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses-dev libssl-dev python3 rsync unzip wget zstd file

      - name: Build packages in OpenWrt SDK
        run: scripts/build-sdk-packages.sh "${{ matrix.target }}"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipregion-${{ matrix.slug }}
          path: /tmp/opencode/openwrt-sdk-builds/**/bin/packages/**/base/*ipregion*.apk
